<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerbox V1 Download</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin-bottom: 20px;
            color: #00adb5;
        }
        input[type="password"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        input[type="password"]:focus {
            outline: 2px solid #00adb5;
        }
        button {
            width: 95%;
            padding: 12px;
            background-color: #00adb5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #007a80;
        }
        .error-msg {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Download Minerbox V1</h2>
    <p>Silakan masukkan password untuk melanjutkan ke link tujuan.</p>
    
    <input type="password" id="passwordInput" placeholder="Password di sini...">
    <button onclick="checkPassword()">Submit & Continue</button>
    
    <p class="error-msg" id="errorMsg">❌ Password salah! Silakan coba lagi.</p>
</div>

<script>
function checkPassword() {
    const correctPassword = "AditzMods"; 
    
    const targetLink = "https://sfl.gl/Ud397fG"; 
    
    const userInput = document.getElementById("passwordInput").value;
    const errorMsg = document.getElementById("errorMsg");

    if (userInput === correctPassword) {
        errorMsg.style.display = "none";
        alert("Password Benar! Anda akan dialihkan...");
        window.location.href = targetLink; 
    } else {
        errorMsg.style.display = "block";
    }
}
</script>

</body>
</html>
